name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Set Nuxt base URL
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          BASE=""
          SITE_URL=""
          # 1) Repository variable (optional): highest priority
          OVERRIDE=$(trim "${{ vars.NUXT_APP_BASE_URL }}")
          if [ -n "$OVERRIDE" ]; then
            BASE="$OVERRIDE"
            echo "Using Actions variable NUXT_APP_BASE_URL=$BASE"
          # 2) Committed file: e.g. / for custom apex domains (no GitHub variable needed)
          elif [ -f .github/pages-base-url ]; then
            B=$(trim "$(cat .github/pages-base-url)")
            if [ -n "$B" ]; then
              BASE="$B"
              echo "Using .github/pages-base-url: $BASE"
            fi
          fi

          # Resolve public site URL for canonical/sitemap tags
          SITE_OVERRIDE=$(trim "${{ vars.NUXT_PUBLIC_SITE_URL }}")
          if [ -n "$SITE_OVERRIDE" ]; then
            SITE_URL="$SITE_OVERRIDE"
            echo "Using Actions variable NUXT_PUBLIC_SITE_URL=$SITE_URL"
          elif [ -f CNAME ]; then
            CNAME_HOST=$(trim "$(cat CNAME)")
            if [ -n "$CNAME_HOST" ]; then
              SITE_URL="https://$CNAME_HOST"
              echo "Using CNAME host for site URL: $SITE_URL"
            fi
          fi

          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://${{ github.repository_owner }}.github.io"
            echo "Using GitHub Pages default host: $SITE_URL"
          fi

          SITE_URL=$(printf '%s' "$SITE_URL" | sed 's:[/[:space:]]*$::')

          if [ -z "$BASE" ]; then
            if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
              BASE="/"
              echo "User/org Pages repo: base /"
            else
              BASE="/${{ github.event.repository.name }}/"
              echo "Project repo default: base $BASE"
            fi
          fi
          echo "NUXT_APP_BASE_URL=$BASE" >> "$GITHUB_ENV"
          echo "NUXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "Final NUXT_APP_BASE_URL=$BASE"
          echo "Final NUXT_PUBLIC_SITE_URL=$SITE_URL"
      - run: npm run generate
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
